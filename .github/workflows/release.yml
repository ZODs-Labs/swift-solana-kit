name: Release

on:
  push:
    tags:
      - "*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: SemVer to validate, for example 0.9.0-rc.1.
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || inputs.version }}
  cancel-in-progress: false

jobs:
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="${{ inputs.version }}"
          fi

          if [[ "${version}" == v* ]]; then
            echo "::error::Use the SwiftPM tag ${version#v}, not ${version}. The GitHub release title may include the v prefix."
            exit 1
          fi

          semver='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*)(\.(0|[1-9][0-9]*|[0-9]*[A-Za-z-][0-9A-Za-z-]*))*))?(\+([0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*))?$'
          if [[ ! "${version}" =~ ${semver} ]]; then
            echo "::error::${version} is not a valid SemVer 2.0.0 version."
            exit 1
          fi

          prerelease=false
          if [[ "${version}" == *-* ]]; then
            prerelease=true
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

  swiftpm-gates:
    name: SwiftPM release gates
    needs: validate-version
    uses: ./.github/workflows/swiftpm-gates.yml
    permissions:
      contents: read
    with:
      run_examples: true
      run_ios: true

  publish-github-release:
    name: Publish GitHub release
    needs:
      - validate-version
      - swiftpm-gates
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate-version.outputs.version }}
          PRERELEASE: ${{ needs.validate-version.outputs.prerelease }}
        run: |
          set -euo pipefail
          if gh release view "${VERSION}" > /dev/null 2>&1; then
            echo "GitHub release ${VERSION} already exists."
            exit 0
          fi

          args=(
            "${VERSION}"
            "--title"
            "v${VERSION}"
            "--generate-notes"
            "--verify-tag"
          )

          if [[ "${PRERELEASE}" == "true" ]]; then
            args+=("--prerelease")
          fi

          gh release create "${args[@]}"
